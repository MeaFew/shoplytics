version: "3.8"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./images:/app/images
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      sh -c "python python/scripts/run_analysis_pipeline.py &&
             cd dashboard && streamlit run app.py --server.address 0.0.0.0 --server.port 8501"

  jupyter:
    image: jupyter/scipy-notebook:latest
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
