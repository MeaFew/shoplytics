version: "3.8"

services:
  # === Core analytics service ===
  analytics:
    build: .
    image: ecommerce-analytics:latest
    container_name: analytics-pipeline
    volumes:
      - ./data:/app/data
      - ./images:/app/images
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    command: python orchestration/pipeline_flow.py

  # === Interactive dashboard ===
  dashboard:
    build: .
    image: ecommerce-analytics:latest
    container_name: analytics-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./images:/app/images
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      streamlit run dashboard/app.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
    depends_on:
      - analytics

  # === Jupyter Lab (exploratory analysis) ===
  jupyter:
    build: .
    image: ecommerce-analytics:latest
    container_name: analytics-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./images:/app/images
    command: >
      jupyter lab
      --ip 0.0.0.0
      --port 8888
      --no-browser
      --allow-root
      --NotebookApp.token='change-me-in-production'
