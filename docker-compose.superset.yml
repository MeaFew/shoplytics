# Apache Superset + DuckDB 配置
# 用法:
#   1. 生成随机密钥（仅首次）: echo "SUPERSET_SECRET_KEY=$(openssl rand -base64 42)" > .env
#   2. docker compose -f docker-compose.superset.yml up -d
#   3. docker compose -f docker-compose.superset.yml logs -f superset
# 访问: http://localhost:8088 (admin / admin)
#
# 注意: SUPERSET_SECRET_KEY 必须通过环境变量/.env 提供，没有默认值。

services:
  superset:
    image: apache/superset:4.1.2
    container_name: superset_ecommerce
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:?请在 .env 文件或环境变量中设置 SUPERSET_SECRET_KEY, 例如: openssl rand -base64 42}
      - DATABASE_DIALECT=sqlite
      - DATABASE_HOST=/app/superset_home/superset.db
      - DATABASE_PORT=
      - DATABASE_DB=superset
      - DATABASE_USER=
      - DATABASE_PASSWORD=
      - PYTHONPATH=/app/pythonpath
      - TALISMAN_ENABLED=false
      - WTF_CSRF_ENABLED=false
      - PREVENT_UNSAFE_DB_CONNECTIONS=false
      - SUPERSET_LOAD_EXAMPLES=no
    volumes:
      # 挂载 DuckDB 数据文件（只读）
      - ./data/processed/analytics.duckdb:/app/data/analytics.duckdb:ro
      # 挂载自定义配置
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/add_duckdb.py:/app/pythonpath/add_duckdb.py
      # 持久化 Superset 元数据
      - superset_data:/app/superset_home
    # 安装 duckdb-engine 并启动
    command: >
      bash -c "
        pip install duckdb-engine>=0.10.0 -q &&
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true &&
        superset init &&
        python /app/pythonpath/add_duckdb.py &&
        superset run -h 0.0.0.0 -p 8088
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  superset_data:
