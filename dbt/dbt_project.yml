name: 'pdd_ecommerce_analytics'
version: '1.0.0'
config-version: 2

profile: 'pdd_ecommerce_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  data_path: '{{ env_var("DBT_DATA_PATH", "data/processed/user_behavior_cleaned.csv") }}'
  start_date: '2017-11-24'
  end_date: '2017-12-03'

models:
  pdd_ecommerce_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      +tags: ["business_ready"]
