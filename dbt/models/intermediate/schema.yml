version: 2

models:
  - name: int_user_daily_metrics
    description: "日级指标中间表：将原始行为数据按用户+日期聚合，为下游留存、LTV模型提供输入"
    columns:
      - name: user_id
        description: "用户ID"
        tests:
          - not_null
      - name: event_date
        description: "统计日期"
        tests:
          - not_null
      - name: total_actions
        description: "总行为次数"
      - name: pv_count
        description: "页面浏览量（点击次数）"
      - name: fav_count
        description: "收藏次数"
      - name: cart_count
        description: "加购次数"
      - name: buy_count
        description: "购买次数"
      - name: unique_items
        description: "去重商品数"
      - name: unique_categories
        description: "去重品类数"
      - name: first_action_ts
        description: "当天首次行为时间戳"
      - name: last_action_ts
        description: "当天最后行为时间戳"
      - name: conversion_rate
        description: "购买转化率 = 购买次数 / 点击次数"
      - name: is_purchase_day
        description: "是否为购买日（0/1）"
      - name: is_cart_day
        description: "是否为加购日（0/1）"

  - name: int_user_retention
    description: "留存分析中间表：每日新增用户及次日/3日/7日留存率"
    columns:
      - name: event_date
        description: "日期"
        tests:
          - not_null
          - unique
      - name: new_users
        description: "当日新增用户数（首次活跃）"
      - name: retained_d1
        description: "次日留存用户数"
      - name: retained_d3
        description: "3日留存用户数"
      - name: retained_d7
        description: "7日留存用户数"
      - name: retention_d1_rate
        description: "次日留存率(%)"
      - name: retention_d3_rate
        description: "3日留存率(%)"
      - name: retention_d7_rate
        description: "7日留存率(%)"
      - name: retention_d1_ma7
        description: "次日留存率7日移动平均"

  - name: int_conversion_funnel
    description: "转化漏斗中间表：从点击到购买的各环节转化数、转化率及路径分析"
    columns:
      - name: event_date
        description: "统计日期"
        tests:
          - not_null
          - unique
      - name: pv_users
        description: "点击用户数（user_id + item_id维度）"
      - name: fav_users
        description: "收藏用户数"
      - name: cart_users
        description: "加购用户数"
      - name: buy_users
        description: "购买用户数"
      - name: pv_to_fav_rate
        description: "点击到收藏转化率(%)"
      - name: fav_to_cart_rate
        description: "收藏到加购转化率(%)"
      - name: cart_to_buy_rate
        description: "加购到购买转化率(%)"
      - name: overall_buy_rate
        description: "总体购买转化率(%)"
      - name: direct_buy_count
        description: "直接购买用户数（无加购/收藏）"
